<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PRS Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #198754, #0d6efd);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .brand-box {
            background: #198754;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .brand-box h2 {
            font-weight: 700;
        }

        .form-box {
            padding: 35px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow register-card">

                <div class="brand-box">
                    <h2>Create PRS Account</h2>
                    <p class="mb-0">Register as Public User, Merchant, or Government Officer</p>
                </div>

                <div class="form-box">

                    <div id="message" class="alert d-none"></div>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Enter full name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter password">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Account Type</label>
                        <select id="roleID" class="form-control">
                            <option value="1">Public User</option>
                            <option value="2">Merchant</option>
                            <option value="3">Government Officer</option>
                        </select>
                    </div>

                    <button onclick="register()" class="btn btn-success w-100 py-2">
                        Create Account
                    </button>

                    <div class="text-center mt-3">
                        <a href="/login-page">Already have an account? Login</a>
                    </div>

                    <div class="text-center mt-2">
                        <a href="/">Back to Home</a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<script>
function register() {
    const fullName = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const roleID = parseInt(document.getElementById("roleID").value);

    const messageBox = document.getElementById("message");
    messageBox.classList.remove("d-none");

    if (!fullName || !email || !password || !confirmPassword) {
        messageBox.className = "alert alert-danger";
        messageBox.innerText = "Please fill in all fields.";
        return;
    }

    if (password !== confirmPassword) {
        messageBox.className = "alert alert-danger";
        messageBox.innerText = "Passwords do not match.";
        return;
    }

    const data = {
        fullName: fullName,
        email: email,
        password: password,
        roleID: roleID
    };

    fetch("/api/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Registration failed");
        }
        return response.json();
    })
    .then(result => {
        messageBox.className = "alert alert-success";
        messageBox.innerText = "Registration successful. Redirecting to login...";

        setTimeout(() => {
            window.location.href = "/login-page";
        }, 1500);
    })
    .catch(error => {
        messageBox.className = "alert alert-danger";
        messageBox.innerText = "Registration failed. Try another email or check your details.";
    });
}
</script>

</body>
</html>
