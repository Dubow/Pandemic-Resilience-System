<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PRS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .brand-box {
            background: #0d6efd;
            color: white;
            padding: 35px;
            text-align: center;
        }

        .brand-box h2 {
            font-weight: 700;
        }

        .form-box {
            padding: 35px;
        }

        .btn {
            border-radius: 10px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow login-card">

                <div class="brand-box">
                    <h2>PRS Login</h2>
                    <p class="mb-0">Pandemic Resilience System</p>
                </div>

                <div class="form-box">

                    <div id="message" class="alert d-none"></div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter password">
                    </div>

                    <button onclick="login()" class="btn btn-primary w-100 py-2">
                        Login
                    </button>

                    <div class="text-center mt-3">
                        <a href="/register-page">Create a new account</a>
                    </div>

                    <div class="text-center mt-2">
                        <a href="/">Back to Home</a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<script>
function login() {
    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    fetch("/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        const messageBox = document.getElementById("message");
        messageBox.classList.remove("d-none");

        if (result.message === "Login successful") {
            localStorage.setItem("userID", result.userID);
            localStorage.setItem("fullName", result.fullName);
            localStorage.setItem("email", result.email);
            localStorage.setItem("roleID", result.roleID);

            if (result.roleID === 3) {
                window.location.href = "/government-dashboard";
            } else if (result.roleID === 2) {
                window.location.href = "/merchant-dashboard";
            } else {
                window.location.href = "/public-dashboard";
            }
        } else {
            messageBox.className = "alert alert-danger";
            messageBox.innerText = result.message;
        }
    })
    .catch(error => {
        const messageBox = document.getElementById("message");
        messageBox.className = "alert alert-danger";
        messageBox.innerText = "Login failed. Please try again.";
    });
}
</script>

</body>
</html>
